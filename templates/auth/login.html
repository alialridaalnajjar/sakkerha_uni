{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="container">
    <div class="auth-card fade-up">

      <!-- Header -->
      <div class="auth-header">
        <div class="brand-mark lg">S</div>
        <h1>Welcome back.</h1>
        <p class="auth-sub">Sign in to your Sakkerha account.</p>
      </div>

      <!-- Form -->
      <form method="POST" action="{{ url_for('auth.login_post') }}" novalidate>
        {% if login_error %}
          <div class="form-error" style="margin-bottom:20px">{{ login_error }}</div>
        {% endif %}
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com"
                 value="{{ prefill_email or '' }}" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <div class="input-icon-wrap">
            <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />
            <button type="button" class="toggle-pw" aria-label="Show password">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        <!-- Remember me + forgot password -->
        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" name="remember" id="remember" />
            <span class="remember-box"></span>
            Remember me for 30 days
          </label>
          <a href="{{ url_for('auth.forgot_password') }}" style="font-size:13px;color:var(--primary);font-weight:600">
            Forgot password?
          </a>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <p class="auth-switch">
        Don't have an account?
        <a href="{{ url_for('auth.signup') }}">Create one &rarr;</a>
      </p>

    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script src="{{ url_for('static', filename='scripts/login.js') }}"></script>
{% endblock %}
