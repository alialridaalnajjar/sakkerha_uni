{% extends "base.html" %} {% block title %}Forgot Password{% endblock %} {%
block content %}
<section class="auth-page">
  <div class="container">
    <div class="auth-card fade-up">
      <div class="auth-header">
        <div class="brand-mark lg">S</div>
        <h1>Forgot your password?</h1>
        <p class="auth-sub">
          Enter your email and we'll send you a reset link.
        </p>
      </div>

      <form
        method="POST"
        action="{{ url_for('auth.forgot_password_post') }}"
        novalidate
      >
        {% if forgot_error %}
        <div class="form-error" style="margin-bottom: 20px">
          {{ forgot_error }}
        </div>
        {% endif %}
        <div class="field">
          <label for="email">Email Address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full">
          Send Reset Link
        </button>
      </form>

      <div class="auth-divider"><span>or</span></div>
      <p class="auth-switch">
        Remembered your password?
        <a href="{{ url_for('auth.login') }}">Sign in &rarr;</a>
      </p>
    </div>
  </div>
</section>
{% endblock %}
