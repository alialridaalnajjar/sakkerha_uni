{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="container">
    <div class="auth-card fade-up">

      <div class="auth-header">
        <div class="brand-mark lg">S</div>
        <h1>Set a new password.</h1>
        <p class="auth-sub">This link expires 30 minutes after it was sent.</p>
      </div>

      <form method="POST" action="{{ url_for('auth.reset_password_post', token=token) }}" novalidate>
        {% if reset_error %}
          <div class="form-error" style="margin-bottom:20px">{{ reset_error }}</div>
        {% endif %}
        <div class="field">
          <label for="new_password">New Password <span class="label-hint">(min. 8 characters)</span></label>
          <input type="password" id="new_password" name="new_password"
                 placeholder="••••••••" required minlength="8" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="confirm_password">Confirm New Password</label>
          <input type="password" id="confirm_password" name="confirm_password"
                 placeholder="••••••••" required autocomplete="new-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Reset Password</button>
      </form>

    </div>
  </div>
</section>
{% endblock %}
